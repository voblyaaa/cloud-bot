<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Хранилище</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root { 
      --bg:#0f0f0f; 
      --card:#1c1c1e; 
      --border:#2c2c2e; 
      --text:#e0e0e0; 
      --text-sec:#888; 
      --accent:#007aff; 
      --danger:#ff3b30; 
      --success:#34c759; 
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { 
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; 
      background:var(--bg); 
      color:var(--text); 
      min-height:100vh; 
      padding:0 16px 100px; 
    }
    .app { max-width:480px; margin:0 auto; display:flex; flex-direction:column; gap:10px; padding-top:12px; }
    .header { display:flex; align-items:center; justify-content:space-between; padding:8px 0; margin-bottom:10px; }
    .header h1 { font-size:1.3rem; font-weight:600; }
    .btn { 
      background:var(--card); 
      border:1px solid var(--border); 
      color:var(--text); 
      padding:10px 14px; 
      border-radius:10px; 
      font-size:0.85rem; 
      display:inline-flex; 
      align-items:center; 
      gap:6px; 
      cursor:pointer; 
      transition:0.2s;
    }
    .btn:active { transform:scale(0.96); }
    .btn:disabled { opacity:0.5; cursor:not-allowed; }
    .btn-primary { background:var(--accent); border-color:var(--accent); color:#fff; }
    .btn-small { padding:6px 10px; font-size:0.75rem; }
    .list { display:flex; flex-direction:column; gap:8px; }
    .card { 
      background:var(--card); 
      border:1px solid var(--border); 
      border-radius:14px; 
      padding:12px; 
      display:flex; 
      align-items:center; 
      gap:12px; 
      cursor:pointer; 
      transition:0.2s; 
    }
    .card:active { background:#252528; }
    .card .icon { 
      width:40px; 
      height:40px; 
      background:rgba(0,122,255,0.1); 
      border-radius:10px; 
      display:flex; 
      align-items:center; 
      justify-content:center; 
      color:var(--accent); 
      flex-shrink:0;
      font-size:1.2rem;
    }
    .card .info { flex:1; min-width:0; }
    .card .name { font-weight:500; overflow:hidden; text-overflow:ellipsis; }
    .card .meta { font-size:0.75rem; color:var(--text-sec); margin-top:2px; }
    .empty { text-align:center; padding:40px 20px; color:var(--text-sec); }
    .breadcrumbs { 
      display:flex; 
      gap:4px; 
      flex-wrap:wrap; 
      font-size:0.8rem; 
      color:var(--text-sec); 
      margin-bottom:10px;
    }
    .breadcrumbs span { cursor:pointer; }
    .breadcrumbs span:hover { color:var(--accent); }
    
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; z-index:400; }
    .overlay.active { display:block; }
    
    .modal { 
      position:fixed; 
      bottom:0;
      left:0;
      right:0;
      background:var(--card); 
      border-top:1px solid var(--border);
      border-radius:20px 20px 0 0;
      transform:translateY(100%);
      transition:transform 0.3s ease;
      z-index:500;
      max-height:80vh;
      overflow-y:auto;
      padding:20px;
      box-sizing:border-box;
    }
    .modal.active { transform:translateY(0); }
    .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom:1px solid var(--border); padding-bottom:15px; }
    .modal-header h3 { font-size:1rem; }
    .modal-close { background:none; border:none; color:var(--text-sec); font-size:1.5rem; cursor:pointer; }
    .modal-actions { display:flex; flex-direction:column; gap:10px; }
    .menu-item { display:flex; align-items:center; gap:12px; padding:12px 16px; background:transparent; border:none; color:var(--text); font-size:0.95rem; cursor:pointer; border-radius:10px; width:100%; text-align:left; }
    .menu-item:active { background:var(--border); }
    .menu-item i { width:20px; }
    .menu-item.danger { color:var(--danger); }
    
    .form-group { margin-bottom:15px; }
    .form-group label { display:block; margin-bottom:8px; font-size:0.9rem; color:var(--text-sec); }
    .form-group input { width:100%; padding:12px; background:#2a2a2a; border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:0.95rem; outline:none; box-sizing:border-box; }
    .form-group input:focus { border-color:var(--accent); }
    
    .preview-modal { position:fixed; inset:0; background:rgba(0,0,0,0.95); display:none; align-items:center; justify-content:center; z-index:500; }
    .preview-modal.active { display:flex; }
    .preview-modal img, .preview-modal video, .preview-modal audio { max-width:100%; max-height:80vh; }
    .preview-close { position:fixed; top:20px; right:20px; color:#fff; font-size:2rem; cursor:pointer; z-index:510; background:rgba(0,0,0,0.5); width:50px; height:50px; display:flex; align-items:center; justify-content:center; border-radius:50%; }
    
    .toast { position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(20px); background:#333; color:#fff; padding:12px 20px; border-radius:12px; font-size:0.9rem; opacity:0; transition:0.3s; z-index:999; pointer-events:none; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    
    #fileInput { display:none; }
    
    .progress-item { padding:12px; background:#2a2a2a; border-radius:10px; margin-bottom:8px; }
    .progress-item .name { font-size:0.9rem; margin-bottom:6px; }
    .progress-item .bar { width:100%; height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
    .progress-item .bar-fill { height:100%; background:var(--accent); width:0%; transition:width 0.3s; }
  </style>
</head>
<body>
  <input type="file" id="fileInput" multiple>

  <div class="app">
    <div class="header">
      <h1 id="title">Папки</h1>
      <button class="btn btn-primary" onclick="selectAndUpload()" title="Загрузить файлы">
        <i class="fa-solid fa-cloud-arrow-up"></i> Загрузить
      </button>
    </div>
    <div class="breadcrumbs" id="breadcrumbs"></div>
    <div id="content" class="list"></div>
  </div>

  <div class="overlay" id="overlay" onclick="closeAllModals()"></div>
  <div class="toast" id="toast"></div>

  <!-- МОДАЛ: Выбор папки для загрузки -->
  <div class="modal" id="uploadFolderModal">
    <div class="modal-header">
      <h3>Выбрать папку</h3>
      <button class="modal-close" onclick="closeModal('uploadFolderModal')">×</button>
    </div>
    <div class="modal-actions" id="uploadFolderList"></div>
  </div>

  <!-- МОДАЛ: Загрузка файлов -->
  <div class="modal" id="uploadProgressModal">
    <div class="modal-header">
      <h3>Загрузка файлов</h3>
    </div>
    <div id="uploadProgressList"></div>
  </div>

  <!-- МОДАЛ: Меню файла -->
  <div class="modal" id="fileMenuModal">
    <div class="modal-header">
      <h3 id="fileMenuTitle">Файл</h3>
      <button class="modal-close" onclick="closeModal('fileMenuModal')">×</button>
    </div>
    <div class="modal-actions" id="fileMenuActions"></div>
  </div>

  <!-- МОДАЛ: Предпросмотр -->
  <div class="preview-modal" id="previewModal">
    <span class="preview-close" onclick="closePreview()">×</span>
    <img id="previewImage" style="display:none;">
    <video id="previewVideo" controls playsinline style="display:none;"></video>
    <audio id="previewAudio" controls playsinline style="display:none;"></audio>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const tg = Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.setHeaderColor(tg.themeParams.secondary_bg_color || '#1c1c1e');
    tg.setBackgroundColor(tg.themeParams.bg_color || '#0f0f0f');

    const initData = tg.initData;
    if (!initData) {
      document.body.innerHTML = '<div class="empty">Откройте через Telegram бота</div>';
      throw new Error('No initData');
    }

    const state = {
      folderId: null,
      folderName: 'Папки',
      parentStack: [],
      isLoading: false,
      folders: []
    };

    const $ = id => document.getElementById(id);
    
    function showToast(msg, type = 'info') {
      const t = $('toast');
      t.textContent = msg;
      t.style.background = type === 'error' ? 'var(--danger)' : type === 'success' ? 'var(--success)' : '#333';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    function getFileIcon(type) {
      const icons = { 
        photo: 'fa-image', 
        video: 'fa-video', 
        audio: 'fa-music', 
        voice: 'fa-microphone', 
        document: 'fa-file-lines', 
        sticker: 'fa-note-sticky', 
        animation: 'fa-film' 
      };
      return `fa-solid ${icons[type] || 'fa-file'}`;
    }

    function openModal(id) {
      $('overlay').classList.add('active');
      $(id).classList.add('active');
    }

    function closeModal(id) {
      $(id).classList.remove('active');
      if (!document.querySelector('.modal.active')) {
        $('overlay').classList.remove('active');
      }
    }

    function closeAllModals() {
      document.querySelectorAll('.modal.active').forEach(m => m.classList.remove('active'));
      $('overlay').classList.remove('active');
    }

    async function api(url, opts = {}) {
      opts.headers = { 'X-Telegram-Init-Data': initData, ...(opts.headers || {}) };
      if (opts.body && !(opts.body instanceof FormData)) {
        if (typeof opts.body === 'object') {
          opts.headers['Content-Type'] = 'application/json';
          opts.body = JSON.stringify(opts.body);
        }
      }
      const res = await fetch(url, opts);
      const responseText = await res.text();
      if (!res.ok) {
        let detail = res.statusText;
        try { const data = JSON.parse(responseText); detail = data.detail || detail; } catch {}
        throw new Error(detail);
      }
      try { return JSON.parse(responseText); } catch { return {}; }
    }

    function renderBreadcrumbs() {
      const bc = $('breadcrumbs');
      if (!state.folderId) { bc.innerHTML = ''; return; }
      let html = `<span onclick="goRoot()" style="color:var(--accent);">Главная</span>`;
      state.parentStack.forEach(p => html += ` / <span onclick="openFolder(${p.id},'${escapeHtml(p.name)}')" style="color:var(--accent);">${escapeHtml(p.name).substring(0, 15)}</span>`);
      if (state.parentStack.length > 0) html += ` /`;
      html += ` <b>${escapeHtml(state.folderName).substring(0, 20)}</b>`;
      bc.innerHTML = html;
    }

    window.goRoot = () => { state.folderId = null; state.parentStack = []; state.folderName = 'Папки'; loadFolders(); };

    async function loadFolders() {
      state.folderId = null;
      state.parentStack = [];
      state.folderName = 'Папки';
      $('title').textContent = 'Папки';
      renderBreadcrumbs();
      $('content').innerHTML = '<div class="empty">Загружаю папки...</div>';
      try {
        const data = await api(' http://0.0.0.0:8080/api/folders');
        state.folders = data.folders || [];
        if (state.folders.length === 0) { 
          $('content').innerHTML = '<div class="empty">Папок пока нет</div>'; 
          return; 
        }
        let html = '';
        state.folders.forEach(f => {
          const status = f.is_public ? 'Публичная' : 'Приватная';
          html += `
            <div class="card" onclick="openFolder(${f.id}, '${escapeHtml(f.name)}', true)">
              <div class="icon"><i class="fa-solid fa-folder"></i></div>
              <div class="info">
                <div class="name">${escapeHtml(f.name)}</div>
                <div class="meta">${status}</div>
              </div>
            </div>
          `;
        });
        $('content').innerHTML = html;
      } catch (e) {
        showToast('Ошибка загрузки', 'error');
        $('content').innerHTML = '<div class="empty">Ошибка загрузки</div>';
      }
    }

    async function openFolder(id, name, pushStack = true) {
      if (pushStack && state.folderId) state.parentStack.push({ id: state.folderId, name: state.folderName });
      state.folderId = id;
      state.folderName = name;
      $('title').textContent = name;
      renderBreadcrumbs();
      $('content').innerHTML = '<div class="empty">Загружаю файлы...</div>';
      await loadFiles();
    }

    async function loadFiles() {
      if (!state.folderId || state.isLoading) return;
      state.isLoading = true;
      try {
        const data = await api(`/api/files/${state.folderId}`);
        const files = data.files || [];
        if (files.length === 0) { 
          $('content').innerHTML = '<div class="empty">Папка пуста</div>'; 
          state.isLoading = false; 
          return; 
        }
        let html = '';
        files.forEach(f => {
          const icon = `<i class="${getFileIcon(f.type)}"></i>`;
          html += `
            <div class="card" onclick="previewFile(${f.id}, '${f.type}', '${escapeHtml(f.name)}')">
              <div class="icon">${icon}</div>
              <div class="info">
                <div class="name">${escapeHtml(f.name)}</div>
                <div class="meta">${formatSize(f.size)} • ${f.type}</div>
              </div>
              <button class="btn btn-small" onclick="event.stopPropagation(); showFileMenu(${f.id}, '${escapeHtml(f.name)}')">
                <i class="fa-solid fa-ellipsis"></i>
              </button>
            </div>
          `;
        });
        $('content').innerHTML = html;
      } catch (e) {
        showToast('Ошибка', 'error');
        $('content').innerHTML = '<div class="empty">Ошибка</div>';
      }
      state.isLoading = false;
    }

    function selectAndUpload() {
      if (state.folders.length === 0) {
        showToast('Сначала создайте папку', 'error');
        return;
      }

      const list = $('uploadFolderList');
      list.innerHTML = '';

      state.folders.forEach(f => {
        const btn = document.createElement('button');
        btn.className = 'menu-item';
        btn.innerHTML = `<i class="fa-solid fa-folder"></i><span>${escapeHtml(f.name)}</span>`;
        btn.onclick = () => {
          closeModal('uploadFolderModal');
          uploadToFolder(f.id, f.name);
        };
        list.appendChild(btn);
      });

      openModal('uploadFolderModal');
    }

    function uploadToFolder(folderId, folderName) {
      $('fileInput').folderId = folderId;
      $('fileInput').folderName = folderName;
      $('fileInput').click();
    }

    $('fileInput').onchange = async (e) => {
      const files = e.target.files;
      const folderId = $('fileInput').folderId;
      const folderName = $('fileInput').folderName;

      if (!files.length || !folderId) return;

      showToast(`Загружаю ${files.length} файл(ов)...`);
      openModal('uploadProgressModal');

      const progressList = $('uploadProgressList');
      progressList.innerHTML = '';

      let uploaded = 0;

      for (let file of files) {
        const progressId = 'progress_' + Math.random().toString(36).substring(7);
        const progressHtml = `
          <div class="progress-item" id="${progressId}">
            <div class="name">${escapeHtml(file.name)}</div>
            <div class="bar">
              <div class="bar-fill" id="${progressId}_fill"></div>
            </div>
          </div>
        `;
        progressList.insertAdjacentHTML('beforeend', progressHtml);

        try {
          const formData = new FormData();
          formData.append('file', file);
          formData.append('folder_id', folderId);
          formData.append('folder_name', folderName);

          const uploadUrl = `/api/upload`;
          
          const xhr = new XMLHttpRequest();
          
          xhr.upload.addEventListener('progress', (e) => {
            if (e.lengthComputable) {
              const percent = (e.loaded / e.total) * 100;
              const fillEl = document.getElementById(progressId + '_fill');
              if (fillEl) fillEl.style.width = percent + '%';
            }
          });

          xhr.addEventListener('load', () => {
            if (xhr.status === 200) {
              const fillEl = document.getElementById(progressId + '_fill');
              if (fillEl) fillEl.style.width = '100%';
              uploaded++;
            } else {
              const item = document.getElementById(progressId);
              if (item) item.style.color = 'var(--danger)';
            }
          });

          xhr.addEventListener('error', () => {
            const item = document.getElementById(progressId);
            if (item) item.style.color = 'var(--danger)';
          });

          xhr.open('POST', uploadUrl);
          xhr.setRequestHeader('X-Telegram-Init-Data', initData);
          xhr.send(formData);

          await new Promise((resolve, reject) => {
            xhr.addEventListener('load', resolve);
            xhr.addEventListener('error', reject);
          });

        } catch (err) {
          console.error('Upload error:', err);
          const item = document.getElementById(progressId);
          if (item) item.style.color = 'var(--danger)';
        }
      }

      setTimeout(() => {
        closeModal('uploadProgressModal');
        showToast(`Загружено ${uploaded}/${files.length} файлов`, 'success');
        $('fileInput').value = '';
        loadFiles();
      }, 500);
    };

    function showFileMenu(fileId, fileName) {
      $('fileMenuTitle').textContent = `Файл: ${fileName.substring(0, 20)}`;
      $('fileMenuActions').innerHTML = `
        <button class="menu-item" onclick="downloadFile(${fileId}, '${escapeHtml(fileName)}')">
          <i class="fa-solid fa-download"></i> <span>Скачать</span>
        </button>
        <button class="menu-item" onclick="previewFile(${fileId}, 'auto', '${escapeHtml(fileName)}')">
          <i class="fa-solid fa-eye"></i> <span>Предпросмотр</span>
        </button>
        <button class="menu-item danger" onclick="deleteFile(${fileId})">
          <i class="fa-solid fa-trash"></i> <span>Удалить</span>
        </button>
      `;
      openModal('fileMenuModal');
    }

    async function previewFile(fileId, fileType, fileName) {
      const modal = $('previewModal');
      $('previewImage').style.display = 'none';
      $('previewVideo').style.display = 'none';
      $('previewAudio').style.display = 'none';
      modal.classList.add('active');
      try {
        const data = await api(`/api/download/${fileId}`);
        if (!data.url) throw new Error('No URL');
        const type = data.file_type || fileType;
        if (type === 'photo' || type === 'image') {
          $('previewImage').src = data.url;
          $('previewImage').style.display = 'block';
        } else if (type === 'video') {
          $('previewVideo').src = data.url;
          $('previewVideo').style.display = 'block';
        } else if (type === 'audio' || type === 'voice') {
          $('previewAudio').src = data.url;
          $('previewAudio').style.display = 'block';
        } else {
          downloadFile(fileId, fileName, data.url);
          closePreview();
        }
      } catch (e) {
        showToast('Ошибка', 'error');
        closePreview();
      }
    }

    function closePreview() {
      $('previewModal').classList.remove('active');
      $('previewVideo').pause();
      $('previewAudio').pause();
    }

    async function downloadFile(fileId, fileName, url) {
      try {
        closeModal('fileMenuModal');
        if (!url) {
          const data = await api(`/api/download/${fileId}`);
          url = data.url;
        }
        if (url) {
          const a = document.createElement('a');
          a.href = url;
          a.download = fileName;
          a.click();
          showToast('Загрузка началась', 'success');
        }
      } catch (e) {
        showToast('Ошибка', 'error');
      }
    }

    async function deleteFile(fileId) {
      if (!confirm('Удалить файл?')) return;
      try {
        closeModal('fileMenuModal');
        await api('/api/action', { method: 'POST', body: { action: 'delete', file_ids: [fileId] } });
        showToast('Удалено', 'success');
        await loadFiles();
      } catch (e) {
        showToast('Ошибка', 'error');
      }
    }

    loadFolders();
  </script>
</body>
</html>
